<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda para Autónomos</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h2>Minha Agenda</h2>
        <div id="servicosDoBanco" style="margin-bottom: 20px; color: var(--roxo-principal); font-weight: bold;">
    Carregando serviços do banco de dados...
</div>
        <input type="text" id="cliente" placeholder="Nome do Cliente">
        <input type="time" id="hora">
        <button onclick="adicionarAgendamento()">Agendar Horário</button>

        <div id="listaAgendamentos">
            </div>
    </div>

<script>
        // 1. Variáveis Globais
        const inputCliente = document.getElementById('cliente');
        const inputHora = document.getElementById('hora');
        const divLista = document.getElementById('listaAgendamentos');
        // --- FUNÇÃO: PUXAR DADOS DO BANCO (SERVIÇOS E PAGAMENTOS) ---
async function carregarDadosIniciais() {
    try {
        // 1. Carregar Serviços
        const resServicos = await fetch('http://localhost:3000/servicos');
        const servicos = await resServicos.json();
        const selectServico = document.getElementById('servico');
        
        selectServico.innerHTML = '<option value="" disabled selected>Selecione um serviço...</option>';
        servicos.forEach(s => {
            selectServico.innerHTML += `<option value="${s.id_servico}">${s.nome} - R$ ${s.preco_padrao}</option>`;
        });
// --- FUNÇÃO: ENVIAR AGENDAMENTO PARA O BANCO ---
async function realizarAgendamento(event) {
    event.preventDefault(); // Impede a página de recarregar e perder os dados

    const dados = {
        nome_cliente: document.getElementById('nome').value,
        data_hora: document.getElementById('data').value,
        id_servico: document.getElementById('servico').value,
        id_metodo: document.getElementById('pagamento').value
    };

    try {
        const resposta = await fetch('http://localhost:3000/agendar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        if (resposta.ok) {
            alert('✅ Sucesso! Agendamento realizado para o Estúdio Débora Braga.');
            document.getElementById('formAgendamento').reset(); // Limpa os campos
        } else {
            alert('❌ Erro ao agendar. Tente novamente.');
        }
    } catch (erro) {
        console.error("Erro no envio:", erro);
        alert('Servidor fora do ar!');
    }
}

// --- CONECTAR O FORMULÁRIO À FUNÇÃO ---
// Esta linha "escuta" o momento que você clica no botão de agendar
document.getElementById('formAgendamento').addEventListener('submit', realizarAgendamento);
        // 2. Carregar Formas de Pagamento
        const resPagamentos = await fetch('http://localhost:3000/pagamentos');
        const pagamentos = await resPagamentos.json();
        const selectPagamento = document.getElementById('pagamento'); // Verifique se o ID no seu HTML é 'pagamento'
        
        selectPagamento.innerHTML = '<option value="" disabled selected>Forma de pagamento...</option>';
        pagamentos.forEach(p => {
            selectPagamento.innerHTML += `<option value="${p.id_metodo}">${p.nome_metodo}</option>`;
        });

        // Limpa a div de teste se ela existir
        const divTeste = document.getElementById('servicosDoBanco');
        if(divTeste) divTeste.style.display = 'none';

    } catch (erro) {
        console.error("Erro ao carregar dados do banco:", erro);
    }
}

// Chama a função ao abrir a página
carregarDadosIniciais();

        // Opcional: remover aquela div de teste de cima se quiser limpar o visual
        const divTeste = document.getElementById('servicosDoBanco');
        if(divTeste) divTeste.style.display = 'none';
        
    } catch (erro) {
        console.error("Erro ao carregar serviços no select:", erro);
    }

}

// Chama a função assim que a página carrega
carregarServicos();
// -----------------------------------------

        // Esta é a nossa lista principal (Array). 
        // Usando o localStorage pra guardar os dados no navegador pra simular um banco, retorna vazio se não achar nada [].
        let meusAgendamentos = JSON.parse(localStorage.getItem('agenda-autonomo')) || [];

        // 2. Função para atualizar o ecrã (Renderizar)
        function atualizarEcra() {
            // Limpa a lista antes de desenhar novamente
            divLista.innerHTML = '';

            // Percorre cada agendamento guardado na nossa lista
            meusAgendamentos.forEach((item, index) => {
                const novoAgendamento = document.createElement('div');
                novoAgendamento.classList.add('item-agenda');

                // Criamos o cartão com um botão que sabe exatamente a sua posição (index) na lista
                novoAgendamento.innerHTML = `
                    <div>
                        <strong>${item.cliente}</strong><br>
                        <small style="color: #666;"> ${item.hora}</small>
                    </div>
                    <button onclick="removerAgendamento(${index})" class="btn-remover">X</button>
                `;
                
                divLista.appendChild(novoAgendamento);
            });
        }

        // 3. Função para adicionar o agendamento
        function adicionarAgendamento() {
            const clienteStr = inputCliente.value;
            const horaStr = inputHora.value;

            // Validação
            if (clienteStr === "" || horaStr === "") {
                alert("Por favor, preencha o nome e o horário.");
                return;
            }

            // dados do novo cliente
            const novoItem = {
                cliente: clienteStr,
                hora: horaStr
            };

            // objeto adicionado no Array
            meusAgendamentos.push(novoItem);

            // lista guardada no localStorage
            localStorage.setItem('agenda-autonomo', JSON.stringify(meusAgendamentos));

            // Limpa os campos
            inputCliente.value = "";
            inputHora.value = "";
            inputCliente.focus();

            // refaz os campos pra adicionar um novo horario
            atualizarEcra();
        }

        // 4. Função para remover um agendamento
        function removerAgendamento(posicaoIndex) {
            // Remove 1 item da lista na posição especificada
            meusAgendamentos.splice(posicaoIndex, 1);

            // Atualiza o localStorage com a lista nova (sem o item apagado)
            localStorage.setItem('agenda-autonomo', JSON.stringify(meusAgendamentos));

            // Atualiza 
            atualizarEcra();
        }

        // 5. Inicialização: Quando a página carrega, chama a função para mostrar o que já estava guardado
        atualizarEcra();
        
    </script>
</body>
</html>
