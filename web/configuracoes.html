<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações – Gündem Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>

<body class="admin-body">
    <header class="admin-header" style="flex-wrap: wrap; gap: 15px;">
        <div class="header-left" style="display: flex; align-items: center;">
            <button onclick="toggleMenuMobile()" class="btn-menu-lateral">☰</button>
            <h1 style="display: flex; align-items: center; gap: 10px; margin: 0;">
                <a href="admin.html" style="display: flex; align-items: center; text-decoration: none;" title="Página Inicial">
                    <img src="/logo-gundem.png" alt="Logo Gündem" style="height: 50px; width: auto; object-fit: contain; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                </a>
                <span class="badge">Configurações</span>
            </h1>
        </div>
        <nav class="nav-desktop">
            <a href="admin.html" class="btn-voltar" style="position: static; margin: 0; padding: 8px 16px; font-size: 14px; text-decoration: none;">← Voltar ao Painel</a>
        </nav>
    </header>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="fecharMenuMobile()"></div>
    <div id="sidebarMobile" class="sidebar-mobile">
        <div class="sidebar-header">
            <h2 style="margin: 0; font-size: 18px;">Menu</h2>
            <button onclick="fecharMenuMobile()" class="btn-fechar-sidebar">✖</button>
        </div>
        <div class="sidebar-content">
            <p class="sidebar-titulo">Navegação</p>
            <button class="btn-aba" onclick="window.location.href='admin.html'">Painel Principal</button>
            
            <p class="sidebar-titulo" style="margin-top: 20px;">Conta</p>
            <a href="perfil.html" class="btn-sidebar-link">Meu Perfil</a>
            <a href="configuracoes.html" class="btn-sidebar-link">Configurações</a>
            <button onclick="logout()" class="btn-sidebar-link btn-sair-sidebar">Sair da Conta</button>
        </div>
    </div>

    <main class="admin-main">
        <section class="admin-tabelas">
            <div class="tabela-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="margin-bottom: 0;">Gerenciar Serviços</h2>
                    <button onclick="abrirModal()" class="btn-enviar" style="width: auto; padding: 10px 20px; font-size: 14px;">+ Novo Serviço</button>
                </div>

                <div id="statusApi" class="status-api" role="status" style="display:none;"></div>

                <div class="table-responsive tabela-responsiva">
                    <table class="table-admin">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Preço (R$)</th>
                                <th>Duração</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyServicos"></tbody>
                    </table>
                </div>

                <div id="listaCardsServicosMobile" class="lista-cards-mobile"></div>
            </div>
        </section>
    </main>

    <div id="modalServico" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="app-container" style="background: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%;">
            <h3 id="modalTitulo">Novo Serviço</h3>
            <form id="formServico">
                <input type="hidden" id="id_servico">
                <label class="field-label">Nome</label>
                <input type="text" id="nome" required>
                <label class="field-label">Descrição</label>
                <textarea id="descricao" rows="2"></textarea>
                <label class="field-label">Preço (R$)</label>
                <input type="number" step="0.01" id="preco" required>
                <label class="field-label">Duração (minutos)</label>
                <input type="number" id="duracao" required>
                <div id="campoAtivo" style="margin-top: 10px;">
                    <label><input type="checkbox" id="ativo" checked> Ativo</label>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-enviar">Salvar</button>
                    <button type="button" onclick="fecharModal()" style="background: #999;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const token = localStorage.getItem('gundem_token');
            const tipo = localStorage.getItem('gundem_user_tipo');

            if (!token || tipo !== 'admin') {
                window.location.href = 'login.html';
                return;
            }

            var API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            function apiUrl(caminho) { return API_BASE + caminho; }

            const tbody = document.getElementById('tbodyServicos');
            const cardsMobile = document.getElementById('listaCardsServicosMobile');
            const statusEl = document.getElementById('statusApi');
            const modal = document.getElementById('modalServico');
            const form = document.getElementById('formServico');

            // Funções do Menu Mobile
            window.toggleMenuMobile = function() {
                document.getElementById('sidebarMobile').classList.add('aberto');
                document.getElementById('sidebarOverlay').classList.add('ativo');
            };
            window.fecharMenuMobile = function() {
                document.getElementById('sidebarMobile').classList.remove('aberto');
                document.getElementById('sidebarOverlay').classList.remove('ativo');
            };
            window.logout = function() {
                localStorage.removeItem('gundem_token');
                localStorage.removeItem('gundem_user_tipo');
                window.location.href = 'login.html';
            };

            function setStatus(msg, tipo) {
                statusEl.textContent = msg;
                statusEl.className = 'status-api' + (tipo ? ' status-api--' + tipo : '');
                statusEl.style.display = 'block';
                if (tipo === 'ok') setTimeout(() => statusEl.style.display = 'none', 3000);
            }

            async function carregarServicos() {
                try {
                    const res = await fetch(apiUrl('/servicos?todos=true'));
                    const servicos = await res.json();
                    
                    if (servicos.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhum serviço encontrado.</td></tr>';
                        cardsMobile.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">Nenhum serviço encontrado.</div>';
                        return;
                    }

                    tbody.innerHTML = servicos.map(s => `
                        <tr>
                            <td><strong>${s.nome}</strong></td>
                            <td>R$ ${Number(s.preco_padrao).toFixed(2)}</td>
                            <td>${s.duracao_minutos} min</td>
                            <td><span class="status-tag ${s.ativo ? '' : 'status-tag--cancelado'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></td>
                            <td>
                                <div style="display: flex; gap: 5px;">
                                    <button onclick='abrirModal(${JSON.stringify(s)})' class="btn-acao" style="background: var(--roxo-principal); padding: 5px 12px;">Editar</button>
                                    <button onclick='excluirServico(${s.id_servico})' class="btn-acao btn-cancelar" style="padding: 5px 12px;">Excluir</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    // NOVO LAYOUT DE CARDS PADRONIZADO (Com botões divididos igual Clientes)
                    cardsMobile.innerHTML = servicos.map(s => `
                        <div class="card-agendamento-mobile" style="border-left-color: ${s.ativo ? 'var(--roxo-principal)' : 'var(--rosa-destaque)'}; margin-bottom: 16px;">
                            <div class="card-mobile__linha"><span class="card-mobile__label">Nome:</span> <span class="card-mobile__valor"><strong>${s.nome}</strong></span></div>
                            <div class="card-mobile__linha"><span class="card-mobile__label">Preço:</span> <span class="card-mobile__valor">R$ ${Number(s.preco_padrao).toFixed(2)}</span></div>
                            <div class="card-mobile__linha"><span class="card-mobile__label">Duração:</span> <span class="card-mobile__valor">${s.duracao_minutos} min</span></div>
                            <div class="card-mobile__linha"><span class="card-mobile__label">Status:</span> <span class="card-mobile__valor status-tag ${s.ativo ? '' : 'status-tag--cancelado'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></div>
                            
                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; display: flex; gap: 10px;">
                                <button onclick='abrirModal(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="btn-acao" style="flex: 1; background: var(--roxo-principal); color: white; border-radius: 8px; padding: 8px 0; font-weight: bold; font-size: 14px;">✏️ Editar</button>
                                <button onclick='excluirServico(${s.id_servico})' class="btn-acao btn-cancelar" style="flex: 1; background: var(--rosa-destaque); color: white; border-radius: 8px; padding: 8px 0; font-weight: bold; font-size: 14px; border: none;">✖ Excluir</button>
                            </div>
                        </div>
                    `).join('');

                } catch (e) { console.error(e); }
            }

            window.abrirModal = function(servico = null) {
                form.reset();
                if (servico) {
                    document.getElementById('modalTitulo').textContent = 'Editar Serviço';
                    document.getElementById('id_servico').value = servico.id_servico;
                    document.getElementById('nome').value = servico.nome;
                    document.getElementById('descricao').value = servico.descricao || '';
                    document.getElementById('preco').value = servico.preco_padrao;
                    document.getElementById('duracao').value = servico.duracao_minutos;
                    document.getElementById('ativo').checked = servico.ativo;
                    document.getElementById('campoAtivo').style.display = 'block';
                } else {
                    document.getElementById('modalTitulo').textContent = 'Novo Serviço';
                    document.getElementById('id_servico').value = '';
                    document.getElementById('campoAtivo').style.display = 'none';
                }
                modal.style.display = 'flex';
            };

            window.fecharModal = function() { modal.style.display = 'none'; };

            window.excluirServico = async function(id) {
                if(!confirm('Tem certeza que deseja excluir este serviço? Esta ação não pode ser visualmente desfeita.')) return;
                try {
                    setStatus('Processando exclusão...', 'info');
                    window.scrollTo(0, 0); 
                    const res = await fetch(apiUrl('/servicos/' + id), {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const resData = await res.json();
                    if (!res.ok) throw new Error(resData.erro || 'Erro ao processar exclusão.');
                    setStatus(resData.mensagem, 'ok');
                    carregarServicos();
                } catch(e) {
                    setStatus(e.message, 'erro');
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('id_servico').value;
                const payload = {
                    nome: document.getElementById('nome').value,
                    descricao: document.getElementById('descricao').value,
                    preco_padrao: parseFloat(document.getElementById('preco').value),
                    duracao_minutos: parseInt(document.getElementById('duracao').value),
                    ativo: document.getElementById('ativo').checked
                };

                const url = id ? `/servicos/${id}` : '/servicos';
                const method = id ? 'PUT' : 'POST';

                try {
                    setStatus('Salvando...', 'info');
                    const res = await fetch(apiUrl(url), {
                        method: method,
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) throw new Error('Erro ao salvar serviço');
                    setStatus('Serviço salvo com sucesso!', 'ok');
                    fecharModal();
                    carregarServicos();
                } catch (e) {
                    setStatus(e.message, 'erro');
                }
            });

            carregarServicos();
        })();
    </script>
</body>
</html>
