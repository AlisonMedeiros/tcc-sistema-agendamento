<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil – Gündem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0;">Meu Perfil</h2>
            <button id="btnEditarAtivar" type="button" style="background: transparent; border: 1px solid var(--roxo-principal); color: var(--roxo-principal); font-size: 13px; font-weight: bold; padding: 6px 14px; border-radius: 4px; cursor: pointer; transition: 0.2s;">Editar</button>
        </div>
        <p class="subtitulo">Atualize suas informações</p>

        <div id="statusPerfil" class="status-api" style="display: none;" role="status"></div>

        <form id="formPerfil" class="form-agendamento" novalidate>
            <label class="field-label" for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required>

            <label class="field-label" for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label class="field-label" for="telefone" id="labelTelefone">Telefone (WhatsApp)</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">

            <button type="submit" id="btnSalvarPerfil" style="margin-top: 15px; margin-bottom: 12px; display: none;">Salvar Alterações</button>
            <button type="button" id="btnVoltar" style="background: transparent; border: 1px solid var(--roxo-principal); color: var(--roxo-principal);">Voltar</button>
        </form>
    </div>

    <script>
        (function () {
            const token = localStorage.getItem('gundem_token');
            const tipo = localStorage.getItem('gundem_user_tipo');

            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // O admin não precisa preencher telefone (já que é só login)
            if(tipo === 'admin') {
                document.getElementById('telefone').style.display = 'none';
                document.getElementById('labelTelefone').style.display = 'none';
            }

            var API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            function apiUrl(caminho) { return API_BASE + caminho; }

            var form = document.getElementById('formPerfil');
            var statusEl = document.getElementById('statusPerfil');
            var btnSalvar = document.getElementById('btnSalvarPerfil');

            function setStatus(msg, tipoMsg) {
                statusEl.textContent = msg;
                statusEl.className = 'status-api' + (tipoMsg ? ' status-api--' + tipoMsg : '');
                statusEl.style.display = 'block';
            }

            // Carregar dados atuais
            async function carregarPerfil() {
                try {
                    const res = await fetch(apiUrl('/perfil'), {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!res.ok) throw new Error('Não foi possível carregar os dados.');
                    const dados = await res.json();
                    
                    document.getElementById('nome').value = dados.nome || '';
                    document.getElementById('email').value = dados.email || '';
                    if(tipo !== 'admin') {
                        document.getElementById('telefone').value = dados.telefone || '';
                    }
                } catch(e) {
                    setStatus(e.message, 'erro');
                }
            }

            carregarPerfil();

            // Desabilitar campos inicialmente
            var inputsPerfil = form.querySelectorAll('input');
            inputsPerfil.forEach(function(i) { i.disabled = true; });

            // Habilitar edição
            document.getElementById('btnEditarAtivar').addEventListener('click', function() {
                inputsPerfil.forEach(function(i) { i.disabled = false; });
                btnSalvar.style.display = 'block';
                document.getElementById('nome').focus();
            });

            // Salvar
            form.addEventListener('submit', async function (ev) {
                ev.preventDefault();
                var nome = document.getElementById('nome').value.trim();
                var email = document.getElementById('email').value.trim();
                var telefone = document.getElementById('telefone').value.trim();
                var senha = document.getElementById('senha') ? document.getElementById('senha').value.trim() : null;

                if (!nome || !email) {
                    setStatus('Nome e e-mail são obrigatórios.', 'erro');
                    return;
                }

                btnSalvar.disabled = true;
                setStatus('Salvando...', 'info');

                try {
                    var res = await fetch(apiUrl('/perfil'), {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ nome: nome, email: email, telefone: telefone, senha: senha || null })
                    });
                    
                    var body = await res.json().catch(function() { return {}; });

                    if (!res.ok) {
                        throw new Error(body.erro || 'Falha ao salvar o perfil.');
                    }

                    setStatus('✔ ' + body.mensagem, 'ok');
                    
                    // Atualiza cache local
                    localStorage.setItem('gundem_user_nome', nome);
                    
                    // Desabilita de volta após salvar
                    inputsPerfil.forEach(function(i) { i.disabled = true; });
                    btnSalvar.style.display = 'none';

                } catch (e) {
                    console.error(e);
                    setStatus(e.message, 'erro');
                } finally {
                    btnSalvar.disabled = false;
                }
            });

            document.getElementById('btnVoltar').addEventListener('click', function() {
                window.location.href = tipo === 'admin' ? 'admin.html' : 'cliente.html';
            });
        })();
    </script>
</body>
</html>
