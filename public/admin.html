<!DOCTYPE html>
<script>
    // Verifica se é realmente um admin
    const tipo = localStorage.getItem('gundem_user_tipo');
    if (tipo !== 'admin') {
        alert('Acesso negado! Esta área é exclusiva para administradores.');
        window.location.href = 'login.html';
    }
</script>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo – Gündem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="admin-body">
    <header class="admin-header">
        <div class="header-left">
            <h1>Güdem <span class="badge">Admin</span></h1>
        </div>
        <nav>
            <a href="index.html" class="btn-voltar">← Voltar ao App</a>
        </nav>
    </header>

    <main class="admin-main">
        <!-- Resumo -->
        <section class="admin-cards">
            <div class="admin-card">
                <h3>Agendamentos Recentes</h3>
                <p id="totalAgendamentos" class="card-valor">...</p>
            </div>
            <div class="admin-card">
                <h3>Serviços Ativos</h3>
                <p id="totalServicos" class="card-valor">...</p>
            </div>
            <div class="admin-card card-financeiro">
                <h3>💰 Faturamento</h3>
                <p id="totalFaturamento" class="card-valor">...</p>
            </div>
        </section>

        <!-- Gráficos (Serviços x Receitas) -->
        <section class="admin-charts" style="margin-bottom: 40px;">
            <div class="tabela-container">
                <h2 style="margin-bottom: 24px;">Serviços x Receitas</h2>
                <div style="position: relative; height: 350px; width: 100%;">
                    <canvas id="graficoMensal"></canvas>
                </div>
            </div>
        </section>

        <!-- Listagens -->
        <section class="admin-tabelas">
            <div class="tabela-container">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
                    <h2 style="margin-bottom: 0;">Todos os Agendamentos</h2>
                    <div style="display: flex; gap: 8px;">
                        <input type="date" id="filtroDataAgendamento" style="margin-bottom: 0; padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; height: 38px;">
                        <button onclick="carregarListaFiltro()" style="width: auto; padding: 0 16px; border-radius: 8px; background-color: var(--roxo-principal); color: white; height: 38px; font-size: 14px;">Filtrar</button>
                        <button onclick="document.getElementById('filtroDataAgendamento').value=''; carregarListaFiltro()" style="width: auto; padding: 0 16px; border-radius: 8px; background-color: #999; color: white; height: 38px; font-size: 14px; box-shadow: none;">Limpar</button>
                    </div>
                </div>
                <div id="statusApi" class="status-api" role="status">Carregando dados...</div>
                <div class="table-responsive">
                    <table class="table-admin" id="tableAgendamentos">
                        <thead>
                            <tr>
                                <th>Data e Hora</th>
                                <th>Cliente</th>
                                <th>Serviço</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyAgendamentos">
                            <!-- preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="tabela-container">
                <h2>Serviços Disponíveis</h2>
                <div class="table-responsive">
                    <table class="table-admin" id="tableServicos">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Duração</th>
                                <th>Preço (R$)</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyServicos">
                            <!-- preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            function apiUrl(caminho) { return API_BASE + caminho; }

            var statusEl = document.getElementById('statusApi');
            var tbodyAg = document.getElementById('tbodyAgendamentos');
            var tbodySv = document.getElementById('tbodyServicos');
            var totalAg = document.getElementById('totalAgendamentos');
            var totalSv = document.getElementById('totalServicos');

            function setStatus(msg, tipo) {
                statusEl.textContent = msg;
                statusEl.className = 'status-api' + (tipo ? ' status-api--' + tipo : '');
                statusEl.style.display = 'block';
            }

            function formatarData(iso) {
                if (!iso) return '—';
                var d = new Date(iso);
                if (isNaN(d.getTime())) return iso;
                return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
            }

            function escapeHtml(s) {
                if (s == null) return '';
                var div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            window.carregarListaFiltro = async function() {
                try {
                    let dataFiltro = document.getElementById('filtroDataAgendamento').value;
                    let url = apiUrl('/agendamentos?limite=100');
                    if (dataFiltro) url += '&data=' + dataFiltro;
                    
                    var resA = await fetch(url);
                    if (!resA.ok) throw new Error('Falha ao carregar agendamentos');
                    var agendamentos = await resA.json();
                    
                    totalAg.textContent = agendamentos.length;
                    
                    if (agendamentos.length === 0) {
                        tbodyAg.innerHTML = '<tr><td colspan="4" class="text-center">Nenhum agendamento encontrado' + (dataFiltro ? ' nesta data.' : '.') + '</td></tr>';
                    } else {
                        tbodyAg.innerHTML = agendamentos.map(function(a) {
                            return `<tr>
                                <td>${formatarData(a.data_hora_inicio)}</td>
                                <td><strong>${escapeHtml(a.cliente)}</strong><br><small>${escapeHtml(a.cliente_telefone || '')}</small></td>
                                <td>${escapeHtml(a.servico)}</td>
                                <td>
                                    <span class="status-tag">${escapeHtml(a.status)}</span>
                                    ${a.status === 'marcado' || a.status === 'confirmado' ? `
                                        <div style="margin-top: 6px; display: flex; gap: 8px;">
                                            <button onclick="atualizarStatus(${a.id_agendamento}, 'concluido')" class="btn-acao btn-concluir" title="Concluir">✔</button>
                                            <button onclick="atualizarStatus(${a.id_agendamento}, 'cancelado')" class="btn-acao btn-cancelar" title="Cancelar">✖</button>
                                        </div>
                                    ` : ''}
                                </td>
                            </tr>`;
                        }).join('');
                    }
                } catch(e) { console.error(e); }
            };

            async function desenharGrafico() {
                try {
                    var res = await fetch(apiUrl('/estatisticas/mensal'), {
                        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('gundem_token') }
                    });
                    if (!res.ok) return;
                    var dados = await res.json();
                    if (dados.length === 0) return;

                    var mesesNome = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                    var labels = dados.map(d => {
                        var partes = d.mes.split('-');
                        return mesesNome[parseInt(partes[1], 10) - 1];
                    });
                    var qtd = dados.map(d => parseInt(d.total_agendamentos, 10));
                    var fat = dados.map(d => parseFloat(d.faturamento));

                    var ctx = document.getElementById('graficoMensal').getContext('2d');
                    if (window.meuGrafico) window.meuGrafico.destroy();
                    
                    window.meuGrafico = new Chart(ctx, {
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    type: 'bar',
                                    label: 'Receitas (R$)',
                                    data: fat,
                                    backgroundColor: '#5dc246',
                                    borderColor: '#27ae60',
                                    borderWidth: 1,
                                    yAxisID: 'y'
                                },
                                {
                                    type: 'line',
                                    label: 'Serviços',
                                    data: qtd,
                                    backgroundColor: '#5b9bd5',
                                    borderColor: '#2980b9',
                                    borderWidth: 3,
                                    pointBackgroundColor: '#2980b9',
                                    tension: 0.3,
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: function(ctx) {
                                            let val = ctx.raw;
                                            if (ctx.dataset.type === 'bar') {
                                                return 'Receitas: ' + new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
                                            }
                                            return 'Serviços: ' + val;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: { 
                                    type: 'linear', display: true, position: 'left',
                                    title: { display: true, text: 'Faturamento (R$)' }
                                },
                                y1: { 
                                    type: 'linear', display: true, position: 'right',
                                    grid: { drawOnChartArea: false },
                                    ticks: { stepSize: 1 },
                                    title: { display: true, text: 'Qtd de Serviços' }
                                }
                            }
                        }
                    });
                } catch(e) { console.error("Erro no gráfico:", e); }
            }

            async function carregarDashboard() {
                try {
                    // Chama a lista com o filtro
                    await carregarListaFiltro();

                    // Carregar Serviços
                    var resS = await fetch(apiUrl('/servicos'));
                    if (!resS.ok) throw new Error('Falha ao carregar serviços');
                    var servicos = await resS.json();
                    
                    totalSv.textContent = servicos.length;

                    if (servicos.length === 0) {
                        tbodySv.innerHTML = '<tr><td colspan="3" class="text-center">Nenhum serviço encontrado.</td></tr>';
                    } else {
                        tbodySv.innerHTML = servicos.map(function(s) {
                            return `<tr>
                                <td><strong>${escapeHtml(s.nome)}</strong></td>
                                <td>${s.duracao_minutos} min</td>
                                <td>R$ ${Number(s.preco_padrao).toFixed(2)}</td>
                            </tr>`;
                        }).join('');
                    }

                    // Carregar Financeiro
                    var resF = await fetch(apiUrl('/financeiro/resumo'), {
                        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('gundem_token') }
                    });
                    if (resF.ok) {
                        var fin = await resF.json();
                        document.getElementById('totalFaturamento').textContent = 
                            fin.faturamento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }

                    await desenharGrafico();
                    setStatus('Dashboard atualizado.', 'ok');
                    setTimeout(() => { statusEl.style.display = 'none'; }, 2000);
                } catch (e) {
                    console.error(e);
                    setStatus('Erro ao carregar os dados. Verifique a API.', 'erro');
                }
            }

            window.atualizarStatus = async function(id, novoStatus) {
                if (!confirm(`Deseja realmente marcar este agendamento como ${novoStatus}?`)) return;
                
                setStatus('Aguarde...', 'info');
                try {
                    var res = await fetch(apiUrl('/agendamentos/' + id + '/status'), {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('gundem_token')
                        },
                        body: JSON.stringify({ status: novoStatus })
                    });
                    
                    if (!res.ok) throw new Error('Falha ao atualizar');
                    
                    await carregarDashboard(); 
                } catch(e) {
                    console.error(e);
                    setStatus('Erro ao atualizar.', 'erro');
                }
            };

            carregarDashboard();
        })();
    </script>
</body>
</html>
