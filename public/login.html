<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Gündem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0; text-align: center;">
            <img src="/logo-gundem.png" alt="Logo Gündem" style="height: 100px; width: auto; object-fit: contain;">
        </h1>
        <div id="boxInstalarApp" style="display: none; background: var(--roxo-principal); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <span style="font-size: 20px; vertical-align: middle; margin-right: 8px;">📲</span>
            <span style="font-weight: bold;">Instalar aplicativo no celular</span>
        </div>

        <div id="statusLogin" class="status-api" style="display: none;" role="status"></div>

        <form id="formLogin" class="form-agendamento" novalidate>
            <label class="field-label" for="email">E-mail</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="Seu e-mail de acesso">

            <label class="field-label" for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required autocomplete="current-password" placeholder="Sua senha secreta">

            <button type="submit" id="btnEntrar" style="margin-bottom: 15px;">Entrar</button>
            <button type="button" id="btnCriarConta" style="background-color: var(--amarelo-secundario); color: #fff; margin-bottom: 10px;">Criar Conta</button>
            
            <div style="text-align: center; margin-top: 10px; display: flex; flex-direction: column; gap: 15px;">
                <a href="recuperar.html" style="font-size: 14px; color: var(--roxo-principal); text-decoration: none; font-weight: bold;">Esqueci minha senha</a>
                <a href="login-admin.html" style="font-size: 14px; color: var(--roxo-principal); text-decoration: none; font-weight: bold;">Acesso para Administrador</a>
            </div>
        </form>
    </div>

    <script>
        (function () {
            var API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            function apiUrl(caminho) { return API_BASE + caminho; }

            var form = document.getElementById('formLogin');
            var statusEl = document.getElementById('statusLogin');
            var btnEntrar = document.getElementById('btnEntrar');

            function setStatus(msg, tipo) {
                statusEl.textContent = msg;
                statusEl.className = 'status-api' + (tipo ? ' status-api--' + tipo : '');
                statusEl.style.display = 'block';
            }

            form.addEventListener('submit', async function (ev) {
                ev.preventDefault();
                var email = document.getElementById('email').value.trim();
                var senha = document.getElementById('senha').value.trim();

                if (!email || !senha) {
                    setStatus('Preencha e-mail e senha.', 'erro');
                    return;
                }

                btnEntrar.disabled = true;
                setStatus('A verificar credenciais...', 'info');

                try {
                    var res = await fetch(apiUrl('/login'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, senha: senha })
                    });
                    
                    var body = await res.json().catch(function() { return {}; });

                    if (!res.ok) {
                        throw new Error(body.erro || 'Falha ao autenticar.');
                    }

                    setStatus('Bem-vindo, ' + body.usuario.nome + '!', 'ok');
                    
                    localStorage.setItem('gundem_user_id', body.usuario.id);
                    localStorage.setItem('gundem_user_nome', body.usuario.nome);
                    localStorage.setItem('gundem_user_tipo', body.usuario.tipo);
                    localStorage.setItem('gundem_token', body.token);

                    setTimeout(function() {
                        if (body.usuario.tipo === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'cliente.html';
                        }
                    }, 1000);

                } catch (e) {
                    console.error(e);
                    setStatus(e.message, 'erro');
                } finally {
                    btnEntrar.disabled = false;
                }
            });

            document.getElementById('btnCriarConta').addEventListener('click', function() {
                window.location.href = 'cadastro.html';
            });
        })();
        // --- LÓGICA DE INSTALAÇÃO DO PWA ---
            var eventoInstalacao;
            var boxInstalarApp = document.getElementById('boxInstalarApp');

            // 1. O navegador avisa que o PWA está pronto para ser instalado
            window.addEventListener('beforeinstallprompt', function(e) {
                // Impede o Chrome de mostrar o mini-alerta padrão imediatamente
                e.preventDefault();
                // Guarda o evento para quando clicar no botão
                eventoInstalacao = e;
                // Botão aparece
                boxInstalarApp.style.display = 'block';
            });

            boxInstalarApp.addEventListener('click', async function() {
                if (!eventoInstalacao) return;
                
                // Dispara o alerta de instalação nativo do telemóvel
                eventoInstalacao.prompt();
                
                var escolha = await eventoInstalacao.userChoice;
                if (escolha.outcome === 'accepted') {
                    console.log('Utilizador aceitou a instalação do PWA');
                    // Esconde o botão, quando já foi instalado
                    boxInstalarApp.style.display = 'none';
                }
                eventoInstalacao = null; // Limpa a variável
            });
    </script>
</body>
</html>
