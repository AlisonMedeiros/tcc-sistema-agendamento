services:
  db:
    image: postgres:16-alpine
    container_name: gudem-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sua_senha}
      POSTGRES_DB: ${DB_NAME:-agendamento_debora}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - "gudem_db_data:/var/lib/postgresql/data"
      - "../docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql"
    networks:
      - gudem-network

  app:
    build: 
      context: ..
      dockerfile: infra/Dockerfile
    container_name: gudem-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-sua_senha}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-agendamento_debora}
      - JWT_SECRET=${JWT_SECRET:-gudem_secreto_super_seguro_2026}
    volumes:
      - "..:/app"
      - "/app/node_modules"
    networks:
      - gudem-network

networks:
  gudem-network:
    driver: bridge

volumes:
  gudem_db_data: